<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tessera™ — Mosaic Bridge Advisory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --clay: #C4A882; --clay-light: #E8D9C4; --clay-dark: #8B7355;
      --ink: #1C1A17; --ink-soft: #4A4640; --ink-muted: #8A8480;
      --surface: #F7F3ED; --surface-raised: #FDFAF6;
      --tile-2: #7B9E87; --tile-3: #8B7BA8; --tile-4: #C4826A; --tile-5: #4A8FA8;
      --border: rgba(28,26,23,0.12);
      --u1: #C4826A; --u2: #4A8FA8; --u3: #4A6FA8; --u4: #2A7A5A; --u5: #5A3A8B; --u5-eng: #8B4A2A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--ink); }

    /* ── Main shell ── */
    #shell { height: 100%; display: flex; flex-direction: column; }

    /* ── Top nav ── */
    .t-nav {
      background: var(--ink); height: 48px; flex-shrink: 0;
      display: flex; align-items: center; gap: 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      position: relative; z-index: 100;
    }
    .nav-brand {
      padding: 0 20px; height: 100%; display: flex; align-items: center;
      font-family: 'DM Serif Display', serif; font-size: 12px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--clay); white-space: nowrap; flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,.08); cursor: pointer;
    }
    .nav-units { display: flex; align-items: center; height: 100%; flex: 1; }
    .nav-unit {
      display: flex; align-items: center; height: 100%; padding: 0 20px;
      cursor: pointer; border-right: 1px solid rgba(255,255,255,.08);
      transition: background .15s; gap: 8px; position: relative;
    }
    .nav-unit:hover { background: rgba(255,255,255,.04); }
    .nav-unit.active { background: rgba(255,255,255,.06); }
    .nav-unit.active::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
    }
    .nav-unit[data-unit="1"].active::after { background: var(--u1); }
    .nav-unit[data-unit="2"].active::after { background: var(--u2); }
    .nav-unit[data-unit="3"].active::after { background: var(--u3); }
    .nav-unit[data-unit="4"].active::after { background: var(--u4); }
    .nav-unit[data-unit="5"].active::after { background: var(--u5-eng); }
    .nav-unit[data-unit="6"].active::after { background: var(--u5); }
    .nu-num {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; color: white; flex-shrink: 0;
    }
    .nav-unit[data-unit="1"] .nu-num { background: var(--u1); }
    .nav-unit[data-unit="2"] .nu-num { background: var(--u2); }
    .nav-unit[data-unit="3"] .nu-num { background: var(--u3); }
    .nav-unit[data-unit="4"] .nu-num { background: var(--u4); }
    .nav-unit[data-unit="5"] .nu-num { background: var(--u5-eng); }
    .nav-unit[data-unit="6"] .nu-num { background: var(--u5); }
    .nu-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.55); white-space: nowrap; }
    .nav-unit.active .nu-label { color: white; }
    .nav-right {
      padding: 0 16px; height: 100%; display: flex; align-items: center;
      gap: 10px; margin-left: auto; border-left: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }
    .nav-mode-badge { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 500; }
    .badge-demo { background: rgba(196,168,130,.2); color: var(--clay); border: 1px solid rgba(196,168,130,.3); }
    .badge-manual { background: rgba(74,143,168,.2); color: #8AB0C8; border: 1px solid rgba(74,143,168,.3); }
    .nav-scenario-sel {
      padding: 4px 10px; border: 1px solid rgba(255,255,255,.15); border-radius: 2px;
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: rgba(255,255,255,.6);
      background: rgba(255,255,255,.06); cursor: pointer;
    }
    .nav-scenario-sel option { color: var(--ink); background: white; }
    .nav-icon-btn {
      padding: 4px 10px; border: 1px solid rgba(255,255,255,.15); border-radius: 2px;
      font-size: 11px; color: rgba(255,255,255,.5); background: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all .15s;
    }
    .nav-icon-btn:hover { border-color: var(--clay); color: var(--clay); }

    /* ── Module sub-nav ── */
    .sub-nav {
      background: rgba(255,255,255,.03); border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; height: 36px; flex-shrink: 0;
      overflow-x: auto; padding: 0 8px;
    }
    .sub-nav::-webkit-scrollbar { display: none; }
    .sub-module {
      padding: 0 14px; height: 100%; display: flex; align-items: center;
      cursor: pointer; font-size: 11px; font-weight: 400; color: rgba(255,255,255,.4);
      white-space: nowrap; border-radius: 2px; transition: all .15s; gap: 6px;
      flex-shrink: 0; position: relative;
    }
    .sub-module:hover { color: rgba(255,255,255,.7); }
    .sub-module.active { color: white; }
    .sub-module.active::after {
      content: ''; position: absolute; bottom: 0; left: 8px; right: 8px; height: 2px;
      border-radius: 1px;
    }
    .sub-nav[data-unit="1"] .sub-module.active::after { background: var(--u1); }
    .sub-nav[data-unit="2"] .sub-module.active::after { background: var(--u2); }
    .sub-nav[data-unit="3"] .sub-module.active::after { background: var(--u3); }
    .sub-nav[data-unit="4"] .sub-module.active::after { background: var(--u4); }
    .sub-nav[data-unit="5"] .sub-module.active::after { background: var(--u5-eng); }
    .sub-nav[data-unit="6"] .sub-module.active::after { background: var(--u5); }
    .sm-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .sub-module.active .sm-dot { opacity: 1; }
    .sub-module:not(.active) .sm-dot { opacity: .4; }
    .sm-sep { width: 1px; height: 14px; background: rgba(255,255,255,.08); margin: 0 4px; flex-shrink: 0; }
    .sm-coming { font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 6px; background: rgba(255,255,255,.06); color: rgba(255,255,255,.3); margin-left: 4px; }

    /* ── Breadcrumb ── */
    .breadcrumb {
      background: rgba(255,255,255,.02); padding: 6px 20px;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .bc-text { font-size: 11px; color: rgba(255,255,255,.3); font-weight: 300; }
    .bc-sep { font-size: 10px; color: rgba(255,255,255,.15); }
    .bc-current { font-size: 11px; color: rgba(255,255,255,.55); font-weight: 400; }
    .bc-progress { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .bc-prog-label { font-size: 10px; color: rgba(255,255,255,.3); font-weight: 300; }
    .bc-prog-track { width: 80px; height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; }
    .bc-prog-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }

    /* ── Content frame ── */
    .content-frame {
      flex: 1; position: relative; overflow: hidden;
    }
    .content-iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; background: var(--surface);
      opacity: 1;
    }
    .frame-loading {
      display: none;
    }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid rgba(28,26,23,.1); border-top-color: var(--clay); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-text { font-size: 13px; color: var(--ink-muted); font-weight: 300; }
    .loading-unit { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--clay-dark); font-style: italic; }

    /* ── Next module strip ── */
    .next-strip {
      background: var(--ink); border-top: 1px solid rgba(255,255,255,.08);
      padding: 8px 20px; display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; gap: 12px;
    }
    .next-label { font-size: 11px; color: rgba(255,255,255,.3); font-weight: 300; }
    .next-btn {
      padding: 6px 16px; background: rgba(196,168,130,.15); border: 1px solid rgba(196,168,130,.3);
      border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      color: var(--clay); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px;
    }
    .next-btn:hover { background: var(--clay); color: white; }
    .prev-btn {
      padding: 6px 14px; border: 1px solid rgba(255,255,255,.1); border-radius: 2px;
      font-family: 'DM Sans', sans-serif; font-size: 12px; color: rgba(255,255,255,.35);
      background: none; cursor: pointer; transition: all .15s;
    }
    .prev-btn:hover { color: rgba(255,255,255,.7); border-color: rgba(255,255,255,.25); }
  </style>
</head>
<body>

<!-- ══ SHELL ══ -->
<div id="shell">

  <!-- Top nav -->
  <nav class="t-nav">
    <div class="nav-brand" onclick="window.location.href='index.html'" title="Back to home">Tessera™</div>
    <div class="nav-units">
      <div class="nav-unit active" data-unit="1" onclick="activateUnit(1)">
        <div class="nu-num">1</div>
        <div class="nu-label">Discover</div>
      </div>
      <div class="nav-unit" data-unit="2" onclick="activateUnit(2)">
        <div class="nu-num">2</div>
        <div class="nu-label">Analyse</div>
      </div>
      <div class="nav-unit" data-unit="3" onclick="activateUnit(3)">
        <div class="nu-num">3</div>
        <div class="nu-label">Communicate</div>
      </div>
      <div class="nav-unit" data-unit="4" onclick="activateUnit(4)">
        <div class="nu-num">4</div>
        <div class="nu-label">Learn</div>
      </div>
      <div class="nav-unit" data-unit="5" onclick="activateUnit(5)">
        <div class="nu-num">5</div>

      </div>
      <div class="nav-unit" data-unit="6" onclick="activateUnit(6)">
        <div class="nu-num">✦</div>

      </div>
    </div>
    <div class="nav-right">
      <a href="tessera-culture.html" style="padding:4px 10px;border:1px solid rgba(90,58,139,.4);border-radius:10px;font-size:10px;font-weight:500;color:#C4A8F0;background:rgba(90,58,139,.2);text-decoration:none;white-space:nowrap;" title="Cultural intelligence — system level">Cultural intelligence</a>
      <span class="nav-mode-badge" id="mode-badge">Demo</span>
      <select class="nav-scenario-sel" id="nav-scenario" onchange="changeScenario(this.value)" style="display:none;">
        <option value="meridian">Meridian Global</option>
        <option value="fusion">Fusion Dynamics</option>
        <option value="nova">Nova Energy</option>
      </select>
      <button class="nav-icon-btn" onclick="saveEngagement()" id="save-btn" style="display:none;">Save ↓</button>
      <button class="nav-icon-btn" onclick="loadEngagement()">Load ↑</button>
    </div>
  </nav>

  <!-- Module sub-nav -->
  <div class="sub-nav" id="sub-nav" data-unit="1"></div>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <div class="bc-text" id="bc-unit">Unit 1 — Discover</div>
    <div class="bc-sep">›</div>
    <div class="bc-current" id="bc-module">Project context</div>
    <div class="bc-progress">
      <div class="bc-prog-label" id="bc-prog-label">1 of 5</div>
      <div class="bc-prog-track">
        <div class="bc-prog-fill" id="bc-prog-fill" style="background:var(--u1);width:20%;"></div>
      </div>
    </div>
  </div>

  <!-- Content iframe -->
  <div class="content-frame">

    <iframe class="content-iframe" id="content-iframe" onload="onFrameLoad()"></iframe>
  </div>

  <!-- Next module strip -->
  <div class="next-strip">
    <button class="prev-btn" id="prev-btn" onclick="navigate(-1)">← Previous</button>
    <div class="next-label" id="next-label">Continue through the engagement</div>
    <button class="next-btn" id="next-btn" onclick="navigate(1)">Next module →</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// MODULE REGISTRY
// ══════════════════════════════════════════
const UNITS = [
  {
    id: 1,
    name: 'Discover',
    fullName: 'Discover',
    color: 'var(--u1)',
    modules: [
      { id:'u1m1', name:'Project context', file:'tessera-app.html', param:'module=1&shell=1' },
      { id:'u1m2', name:'Listening tour', file:'tessera-app.html', param:'module=2&shell=1' },
      { id:'u1m3', name:'Stakeholder map', file:'tessera-app.html', param:'module=3&shell=1' },
      { id:'u1m4', name:'Experience design', file:'tessera-app.html', param:'module=4&shell=1' },
      { id:'u1m5', name:'Diagnostic output', file:'tessera-app.html', param:'module=5&shell=1' },
    ]
  },
  {
    id: 2,
    name: 'Analyse',
    fullName: 'Analyse',
    color: 'var(--u2)',
    modules: [
      { id:'u2m1', name:'Employee roster', file:'tessera-roster.html', param:'shell=1' },
      { id:'u2m2', name:'Project team', file:'tessera-team.html', param:'shell=1' },
      { id:'u2m3', name:'Document intake', file:'tessera-intake.html', param:'shell=1' },
      { id:'u2m4', name:'Change impact', file:'tessera-cia.html', param:'shell=1' },
    ]
  },
  {
    id: 3,
    name: 'Communicate',
    fullName: 'Communicate',
    color: 'var(--u3)',
    modules: [
      { id:'u3m1', name:'Strategy', file:'tessera-comms.html', param:'tab=1&shell=1' },
      { id:'u3m2', name:'Message architecture', file:'tessera-comms.html', param:'tab=2&shell=1' },
      { id:'u3m3', name:'Cascade model', file:'tessera-comms.html', param:'tab=3&shell=1' },
      { id:'u3m4', name:'Plan & calendar', file:'tessera-comms.html', param:'tab=4&shell=1' },
      { id:'u3m5', name:'Draft editor', file:'tessera-comms.html', param:'tab=5&shell=1' },
      { id:'u3m6', name:'Tracking', file:'tessera-comms.html', param:'tab=6&shell=1' },
      { id:'u3m7', name:'Content library', file:'tessera-content-library.html', param:'shell=1' },
    ]
  },
  {
    id: 4,
    name: 'Learn',
    fullName: 'Learn',
    color: 'var(--u4)',
    modules: [
      { id:'u4m1', name:'Training needs', file:'tessera-learning.html', param:'module=1&shell=1' },
      { id:'u4m2', name:'Cohort design', file:'tessera-learning.html', param:'module=2&shell=1' },
      { id:'u4m3', name:'Learning journeys', file:'tessera-learning.html', param:'module=3&shell=1' },
      { id:'u4m4', name:'Curriculum', file:'tessera-learning.html', param:'module=4&shell=1' },
      { id:'u4m5', name:'Scheduling', file:'tessera-learning.html', param:'module=5&shell=1' },
      { id:'u4m6', name:'Adoption', file:'tessera-learning.html', param:'module=6&shell=1' },
    ]
  },
  {
    id: 5,
    name: 'Engage',
    fullName: 'Engage',
    color: 'var(--u5-eng)',
    modules: [
      { id:'u5m1', name:'Sponsor map', file:'tessera-engage.html', param:'module=1&shell=1' },
      { id:'u5m2', name:'Coalition design', file:'tessera-engage.html', param:'module=2&shell=1' },
      { id:'u5m3', name:'People brief', file:'tessera-engage.html', param:'module=3&shell=1' },
      { id:'u5m4', name:'Visibility plan', file:'tessera-engage.html', param:'module=4&shell=1' },
      { id:'u5m5', name:'Action plan', file:'tessera-engage.html', param:'module=5&shell=1' },
    ]
  },
  {
    id: 6,
    name: 'Culture',
    fullName: 'Culture',
    color: 'var(--u5)',
    modules: [
      { id:'u6m1', name:'Group profiles', file:'tessera-culture.html', param:'view=profile&shell=1' },
      { id:'u6m2', name:'Group comparison', file:'tessera-culture.html', param:'view=compare&shell=1' },
      { id:'u6m3', name:'Framework library', file:'tessera-culture.html', param:'view=library&shell=1' },
      { id:'u6m4', name:'Intelligence input', file:'tessera-culture.html', param:'view=intelligence&shell=1' },
    ]
  }
];

// Flat list of all modules in order
const ALL_MODULES = UNITS.flatMap(u => u.modules.map(m => ({...m, unitId:u.id, unitName:u.name, unitFullName:u.fullName, unitColor:u.color})));

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let appMode = 'demo';
let currentScenario = 'meridian';
let currentUnitId = 1;
let currentModuleId = 'u1m1';
let selectedGateMode = null;
let selectedGateScenario = null;

// ══════════════════════════════════════════
// GATE
// ══════════════════════════════════════════


function startApp() {
  // Kept for compatibility — direct launch now handled in DOMContentLoaded
  activateUnit(1, true);
}


// ══════════════════════════════════════════
// UNIT & MODULE NAVIGATION
// ══════════════════════════════════════════
function activateUnit(unitId, jumpToFirst) {
  currentUnitId = unitId;
  const unit = UNITS.find(u=>u.id===unitId);
  if (!unit) return;

  // Update unit tabs
  document.querySelectorAll('.nav-unit').forEach(tab => {
    tab.classList.toggle('active', parseInt(tab.dataset.unit) === unitId);
  });

  // Build sub-nav
  buildSubNav(unitId, currentModuleId);

  if (jumpToFirst || !unit.modules.find(m=>m.id===currentModuleId)) {
    loadModule(unit.modules[0].id);
  }
}

function buildSubNav(unitId, activeModuleId) {
  const unit = UNITS.find(u=>u.id===unitId);
  if (!unit) return;
  const subNav = document.getElementById('sub-nav');
  subNav.dataset.unit = unitId;
  subNav.innerHTML = unit.modules.map((m,i) => `
    <div class="sub-module ${m.id===activeModuleId?'active':''}" data-module="${m.id}" onclick="loadModule('${m.id}')">
      <div class="sm-dot" style="background:${unit.color};"></div>
      ${m.name}
    </div>
    ${i < unit.modules.length-1 ? '<div class="sm-sep"></div>' : ''}
  `).join('');
}

function loadModule(moduleId) {
  currentModuleId = moduleId;
  const mod = ALL_MODULES.find(m=>m.id===moduleId);
  if (!mod) return;
  currentUnitId = mod.unitId;

  // Update unit tabs
  document.querySelectorAll('.nav-unit').forEach(tab => {
    tab.classList.toggle('active', parseInt(tab.dataset.unit) === mod.unitId);
  });

  // Always rebuild sub-nav for correct unit with correct active state
  buildSubNav(mod.unitId, moduleId);

  // Update breadcrumb
  document.getElementById('bc-unit').textContent = mod.unitFullName;
  document.getElementById('bc-module').textContent = mod.name.replace(/&amp;/g,'&').replace(/&/g,'&');
  const allIdx = ALL_MODULES.findIndex(m=>m.id===moduleId);
  const totalModules = ALL_MODULES.length;
  document.getElementById('bc-prog-label').textContent = (allIdx+1) + ' of ' + totalModules;
  document.getElementById('bc-prog-fill').style.background = mod.unitColor;
  document.getElementById('bc-prog-fill').style.width = `${((allIdx+1)/totalModules)*100}%`;

  // Update next/prev
  const prevMod = ALL_MODULES[allIdx-1];
  const nextMod = ALL_MODULES[allIdx+1];
  document.getElementById('prev-btn').style.visibility = prevMod ? 'visible' : 'hidden';
  document.getElementById('prev-btn').textContent = prevMod ? '← ' + prevMod.name.replace(/&amp;/g,'&') : '←';
  if (nextMod) {
    document.getElementById('next-btn').textContent = nextMod.name.replace(/&amp;/g,'&') + ' →';
    document.getElementById('next-label').textContent = nextMod.unitId !== mod.unitId ? nextMod.unitFullName : '';
  } else {
    document.getElementById('next-btn').textContent = 'All done ✓';
    document.getElementById('next-label').textContent = 'All built modules complete';
  }

  const iframe = document.getElementById('content-iframe');

  // Build URL — shell=1 tells module files to hide their own nav
  let url = mod.file;
  const params = [];
  if (appMode === 'demo') params.push('mode=demo&scenario=' + currentScenario);
  if (mod.param) params.push(mod.param);
  if (params.length) url += '?' + params.join('&');
  iframe.src = url;
}

function navigate(dir) {
  const allIdx = ALL_MODULES.findIndex(m=>m.id===currentModuleId);
  const next = ALL_MODULES[allIdx + dir];
  if (next) loadModule(next.id);
}

function onFrameLoad() {
  // iframe loaded -- content visible
}

function changeScenario(val) {
  currentScenario = val;
  loadModule(currentModuleId);
}

function saveEngagement() {
  alert('Save engagement: exports the full engagement JSON file. The practitioner loads this at the start of the next session to pick up where they left off.\n\nIn the full build this saves to the cloud and is available on any device.');
}

function loadEngagement() {
  alert('Load engagement: import a previously saved Tessera engagement file (.json) to restore all data across all units.');
}

// ══════════════════════════════════════════
// MOSAIC ANIMATION
// ══════════════════════════════════════════
const COLORS = ['#C4A882','#7B9E87','#8B7BA8','#C4826A','#4A8FA8','#1C1A17','#E8D9C4'];
// gate mosaic removed

// ══════════════════════════════════════════
// URL PARAMS — support direct linking
// ══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode') || 'demo';
  const scenario = params.get('scenario') || 'meridian';
  const module = params.get('module');

  // Launch directly — no gate screen needed
  appMode = mode;
  currentScenario = scenario;
  selectedGateMode = mode;
  selectedGateScenario = scenario;

  // Set up nav
  const badge = document.getElementById('mode-badge');
  const scenarioSel = document.getElementById('nav-scenario');
  const saveBtn = document.getElementById('save-btn');

  badge.textContent = mode === 'demo' ? 'Demo' : 'Live';
  badge.className = 'nav-mode-badge ' + (mode === 'demo' ? 'badge-demo' : 'badge-manual');

  if (mode === 'demo') {
    scenarioSel.style.display = 'block';
    scenarioSel.value = scenario;
  } else {
    if (saveBtn) saveBtn.style.display = 'block';
  }

  // Launch into Unit 1
  activateUnit(1, true);

  // Navigate to specific module if requested
  if (module) {
    setTimeout(() => loadModule(module), 300);
  }
});
</script>
